media:
  - name: exhibition
    label: Exhibition Media
    input: assets/exhibition
    output: /assets/exhibition
    categories: [ image ]
  - name: originals
    label: Artwork Originals
    input: assets/uploads/originals
    output: /assets/uploads/originals
    categories: [ image ]
  - name: artist_portraits
    label: Artist Portraits
    input: assets/uploads/artists
    output: /assets/uploads/artists
    categories: [ image ]

content:
  - name: exhibition
    label: Exhibition Info
    type: file
    path: _exhibition/index.md
    fields:
      - name: title
        label: Exhibition Name
        type: string
        required: true
      - name: slug
        label: Exhibition Slug
        type: string
        required: true
        description: Stable machine name used in poster filenames and links.
      - name: dates
        label: Dates
        type: string
      - name: venue
        label: Venue
        type: string
      - name: tagline
        label: Tagline
        type: text
      - name: poster_image
        label: Poster or Cover
        type: image
        options:
          media: exhibition
      - name: hero_alt
        label: Poster Alt Text
        type: string
      - name: cms_url
        label: Pages CMS URL
        type: string
      - name: public_url
        label: Public Site URL
        type: string
      - name: body
        label: Exhibition Description
        type: rich-text
        required: true
  - name: artworks
    label: Artworks
    type: collection
    path: _artworks
    filename: "{slug}.md"
    subfolders: false
    view:
      fields: [ title, artist_name, camera_model, location ]
      primary: title
      sort: [ title, artist_name ]
      default:
        sort: title
        order: asc
    fields:
      - name: title
        label: Artwork Title
        type: string
        required: true
      - name: slug
        label: File Slug
        type: string
        required: true
        description: Use the same `{artist}-{title}` machine name that the upload page generates.
      - name: artist_name
        label: Artist Name
        type: string
        required: true
      - name: artist_slug
        label: Artist Slug
        type: string
        required: true
      - name: camera_model
        label: Camera Model
        type: string
        required: true
      - name: location
        label: Location
        type: string
        required: true
      - name: sns_id
        label: SNS ID
        type: string
      - name: image
        label: Original Image
        type: image
        required: true
        options:
          media: originals
      - name: thumb_image
        label: Thumbnail Path
        type: string
        description: Generated by GitHub Actions as `/assets/uploads/thumbs/{slug}.webp`.
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: order
        label: Order
        type: number
      - name: body
        label: Artwork Description
        type: rich-text
        required: true
  - name: artists
    label: Artists
    type: collection
    path: _artists
    filename: "{slug}.md"
    subfolders: false
    view:
      fields: [ name, camera_model ]
      primary: name
      sort: [ name, camera_model ]
      default:
        sort: name
        order: asc
    fields:
      - name: name
        label: Artist Name
        type: string
        required: true
      - name: slug
        label: File Slug
        type: string
        required: true
      - name: camera_model
        label: Camera Model
        type: string
        required: true
      - name: portrait_image
        label: Artist Portrait
        type: image
        options:
          media: artist_portraits
      - name: order
        label: Order
        type: number
      - name: body
        label: Artist Description
        type: rich-text
        required: true

settings:
  content:
    merge: true
