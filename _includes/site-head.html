{% assign exhibition = site.exhibition | first %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ exhibition.title | default: site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: exhibition.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% if page.scripts %}
      {% for script in page.scripts %}
        <script src="{{ script | relative_url }}" defer></script>
      {% endfor %}
    {% endif %}
  </head>
  <body class="{{ page.body_class | default: 'default-page' }}">
