---
title: Artists
description: Artist list with camera models and bios.
---
{% assign artists = site.artists | sort: 'order' %}
<section class="page-shell">
  <div class="site-shell">
    <header class="page-header">
      <p class="page-kicker">Artist Directory</p>
      <h1>Artists</h1>
    </header>
    <div class="artist-list">
      {% for artist in artists %}
        <article class="artist-card">
          <div class="artist-head">
            <h2>{{ artist.name }}</h2>
            <p>{{ artist.camera_model }}</p>
          </div>
          <div class="artist-body">
            {{ artist.content | markdownify }}
          </div>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
