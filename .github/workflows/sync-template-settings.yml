name: Sync Template Settings

on:
  push:
    branches:
      - main
    paths:
      - "exhibition.setup.yml"
      - "scripts/sync-template-config.mjs"
      - "package.json"
      - ".github/workflows/sync-template-settings.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-template-settings-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate template config files
        run: npm run sync:template

      - name: Commit generated config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _config.yml assets/js/config.js _exhibition/index.md
          if git diff --cached --quiet; then
            echo "No generated config changes to commit."
            exit 0
          fi
          git commit -m "chore: sync template settings"
          git push
